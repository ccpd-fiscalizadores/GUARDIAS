<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA DE GUARDIAS</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#051F20">

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta de verdes solicitada */
            --bg: #051F20;         
            --card: #0B2B26;       
            --accent: #235E51;     
            --menta: #DAF1DE;      
            --texto: #f8fafc;
            --texto-sec: #8EB69B;  
            --borde: #163832;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--texto); overflow-x: hidden; }

        header { 
            background: var(--card); padding: 1rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 1000; 
        }

        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px 40px; }
        
        .card-folder { 
            background: var(--card); padding: 25px; border-radius: 18px; 
            border: 1px solid var(--borde); text-align: center; cursor: pointer; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }
        .card-folder:hover { transform: translateY(-5px); border-color: var(--menta); }
        
        .cv-container { max-width: 800px; margin: 20px auto; background: var(--card); border-radius: 24px; overflow: hidden; }
        .cv-banner { background: linear-gradient(135deg, #163832 0%, #051F20 100%); padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--accent); }
        .cv-photo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--menta); object-fit: cover; }

        .info-group { margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; }
        .info-label { font-size: 0.75rem; color: var(--texto-sec); text-transform: uppercase; }
        .info-value { font-size: 1rem; font-weight: 600; color: var(--menta); }

        input, select, textarea { 
            background: #0B2B26; border: 1px solid var(--borde); color: white; 
            padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px;
        }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--menta); padding: 10px 20px; border-radius: 10px; cursor: pointer; }

        #vistaLogin { height: 100vh; display: flex; align-items: center; justify-content: center; }
        #mainHeader, #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <div id="vistaLogin">
        <div style="background: var(--card); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--borde);">
            <h1 style="color: var(--menta); margin-bottom: 20px;">SISTEMA GUARDIAS</h1>
            <input type="email" id="loginEmail" placeholder="Usuario">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button class="btn-primary" onclick="login()">INGRESAR</button>
        </div>
    </div>

    <header id="mainHeader">
        <div onclick="location.reload()" style="cursor:pointer; font-weight:800; color: var(--menta);">CONTROL DE GUARDIAS</div>
        <button onclick="logout()" style="color:#ff6b6b; background:none; border:none; font-weight:bold; cursor:pointer;">SALIR</button>
    </header>

    <div id="vistaDashboard">
        <div style="padding: 20px 40px; display: flex; gap: 15px;">
            <input type="text" id="busqueda" placeholder="Buscar por Nombre o Congregación..." onkeyup="buscador()">
            <button class="btn-primary" style="width:auto;" onclick="abrirEditor()">+ NUEVO</button>
        </div>
        <div style="padding: 0 40px;">
            <button id="btnBack" class="btn-outline" onclick="volverAtras()" style="display:none; margin-bottom: 20px;">← VOLVER</button>
            <h3 id="tituloTxt" style="color: var(--texto-sec);">Ciudades</h3>
        </div>
        <div id="gridMain" class="grid-main"></div>
    </div>

    <div id="vistaCV">
        <div style="padding: 20px 40px;"><button class="btn-outline" onclick="irDashboard()">← VOLVER</button></div>
        <div id="cvContent" class="cv-container"></div>
    </div>

    <div id="vistaEditor">
        <div style="max-width: 600px; margin: 20px auto; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--borde);">
            <h2 style="color: var(--menta); margin-bottom: 20px;">Registro de Guardia</h2>
            <div style="display: grid; gap: 10px;">
                <input type="text" id="inNom" placeholder="Nombre Completo">
                <input type="date" id="inFechaNac">
                <input type="text" id="inCong" placeholder="Congregación">
                <input type="text" id="inCiu" placeholder="Ciudad">
                <input type="text" id="inTel" placeholder="WhatsApp">
                <input type="text" id="inDoc" placeholder="Documento">
                
                <label style="color: var(--texto-sec); font-size: 0.8rem;">RANGO:</label>
                <select id="inRango">
                    <option value="Guardia 1ro">Guardia 1ro</option>
                    <option value="Guardia 2do">Guardia 2do</option>
                    <option value="Guardia 3ro">Guardia 3ro</option>
                    <option value="Guardia 4to">Guardia 4to</option>
                </select>

                <textarea id="inHist" placeholder="Historial/Observaciones..."></textarea>
                <input type="text" id="inFoto" placeholder="URL de la Foto">
                
                <button class="btn-primary" onclick="guardar()">GUARDAR</button>
                <button class="btn-outline" onclick="irDashboard()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqRqarsT3kDLbb6id6N7p-zzC2BISWOWc",
            authDomain: "guardias-965a2.firebaseapp.com",
            projectId: "guardias-965a2",
            storageBucket: "guardias-965a2.firebasestorage.app",
            messagingSenderId: "1035525169686",
            appId: "1:1035525169686:web:043db97fdfc15524bf4b37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let miembros = [];
        let idEdit = null;
        let nivel = "ciudades";

        function calcularEdad(fecha) {
            if(!fecha) return '---';
            const cumple = new Date(fecha);
            const hoy = new Date();
            let edad = hoy.getFullYear() - cumple.getFullYear();
            if (hoy.getMonth() < cumple.getMonth() || (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
            return edad + " años";
        }

        function login() { localStorage.setItem('session_g', 'active'); mostrarSistema(); }
        function logout() { localStorage.clear(); location.reload(); }

        function mostrarSistema() {
            document.getElementById('vistaLogin').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            irDashboard();
        }

        function irDashboard() {
            document.getElementById('vistaDashboard').style.display = 'block';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'none';
            escuchar();
        }

        function escuchar() {
            db.collection("personal_guardia").onSnapshot(snap => {
                miembros = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                if(nivel === "ciudades") renderCiudades();
            });
        }

        function renderCiudades() {
            nivel = "ciudades";
            document.getElementById('btnBack').style.display = 'none';
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const cius = [...new Set(miembros.map(m => m.ciudad))];
            cius.forEach(c => {
                grid.innerHTML += `<div class="card-folder" onclick="verCongs('${c}')"><h3>📍 ${c}</h3></div>`;
            });
        }

        function verCongs(c) {
            nivel = "congs";
            document.getElementById('btnBack').style.display = 'inline-block';
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const congs = [...new Set(miembros.filter(m => m.ciudad === c).map(m => m.cong))];
            congs.forEach(co => {
                grid.innerHTML += `<div class="card-folder" onclick="verMiembros('${co}')"><h3>⛪ ${co}</h3></div>`;
            });
        }

        function verMiembros(co) {
            nivel = "miembros";
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            miembros.filter(m => m.cong === co).forEach(m => {
                grid.innerHTML += `<div class="card-folder" onclick="verCV('${m.id}')">
                    <img src="${m.foto || 'https://via.placeholder.com/80?text=👤'}" style="width:70px; height:70px; border-radius:50%; object-fit:cover; border:2px solid var(--menta);">
                    <h3 style="margin-top:10px;">${m.nombre}</h3>
                    <p style="color:var(--menta); font-size:0.8rem;">${m.rango}</p>
                </div>`;
            });
        }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvContent').innerHTML = `
                <div class="cv-banner">
                    <img src="${m.foto || 'https://via.placeholder.com/160?text=FOTO'}" class="cv-photo">
                    <h2 style="margin-top:15px;">${m.nombre}</h2>
                    <p style="color:var(--menta); font-weight:bold;">${m.rango}</p>
                </div>
                <div style="padding:30px;">
                    <div class="info-group"><span class="info-label">Edad</span><span class="info-value">${calcularEdad(m.fechaNac)}</span></div>
                    <div class="info-group"><span class="info-label">Sede</span><span class="info-value">${m.cong}</span></div>
                    <div class="info-group"><span class="info-label">WhatsApp</span><span class="info-value">${m.tel}</span></div>
                    <div class="info-group"><span class="info-label">Documento</span><span class="info-value">${m.doc}</span></div>
                    <div class="info-group"><span class="info-label">Observaciones</span><p>${m.hist || 'Sin datos.'}</p></div>
                    <button class="btn-primary" onclick="abrirEditor('${m.id}')">EDITAR</button>
                </div>`;
        }

        function abrirEditor(id = null) {
            idEdit = id;
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';
            if(id) {
                const m = miembros.find(x => x.id === id);
                document.getElementById('inNom').value = m.nombre;
                document.getElementById('inFechaNac').value = m.fechaNac;
                document.getElementById('inCong').value = m.cong;
                document.getElementById('inCiu').value = m.ciudad;
                document.getElementById('inTel').value = m.tel;
                document.getElementById('inDoc').value = m.doc;
                document.getElementById('inRango').value = m.rango;
                document.getElementById('inHist').value = m.hist;
                document.getElementById('inFoto').value = m.foto || "";
            }
        }

        async function guardar() {
            const data = {
                nombre: document.getElementById('inNom').value,
                fechaNac: document.getElementById('inFechaNac').value,
                cong: document.getElementById('inCong').value,
                ciudad: document.getElementById('inCiu').value,
                tel: document.getElementById('inTel').value,
                doc: document.getElementById('inDoc').value,
                rango: document.getElementById('inRango').value,
                hist: document.getElementById('inHist').value,
                foto: document.getElementById('inFoto').value
            };
            if(idEdit) await db.collection("personal_guardia").doc(idEdit).update(data);
            else await db.collection("personal_guardia").add(data);
            irDashboard();
        }

        function volverAtras() { renderCiudades(); }
        window.onload = () => { if(localStorage.getItem('session_g')) mostrarSistema(); };
    </script>
</body>
</html>
