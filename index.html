<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA DE GESTIÓN INSTITUCIONAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020c0b;
            --bg-glass: rgba(11, 43, 38, 0.95);
            --gold: #C5A059;
            --texto: #f8fafc;
            --input-bg: rgba(0,0,0,0.3);
            --card-border: rgba(197, 160, 89, 0.3);
        }

        [data-theme="light"] {
            --bg-deep: #f1f5f9;
            --bg-glass: rgba(255, 255, 255, 0.95);
            --gold: #A67C00;
            --texto: #0f172a;
            --input-bg: #ffffff;
            --card-border: rgba(166, 124, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-deep); color: var(--texto); min-height: 100vh; overflow-x: hidden; }

        header { 
            background: var(--bg-glass); padding: 1.2rem 2rem; border-bottom: 2px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }

        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .grid-nav { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .card-nav { 
            background: var(--bg-glass); padding: 30px; border-radius: 20px; border: 1px solid var(--card-border);
            cursor: pointer; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .cv-card { background: var(--bg-glass); border-radius: 30px; border: 1px solid var(--gold); overflow: hidden; max-width: 800px; margin: auto; }
        .cv-header { display: grid; grid-template-columns: 250px 1fr; background: rgba(0,0,0,0.05); border-bottom: 2px solid var(--gold); }
        .cv-photo { width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; cursor: zoom-in; }
        .cv-details { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 30px; }
        .cv-item { background: rgba(197, 160, 89, 0.05); padding: 15px; border-radius: 15px; border-left: 3px solid var(--gold); }
        .cv-label { font-size: 0.7rem; color: var(--gold); font-weight: 800; text-transform: uppercase; }

        .circulo-foto { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: rgba(0,0,0,0.1); }
        input, select, textarea { background: var(--input-bg); border: 1px solid var(--card-border); color: var(--texto); padding: 12px; border-radius: 8px; width: 100%; }

        .btn-gold { background: var(--gold); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-back { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-bottom: 15px; }
        
        #zoomModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .vistas, #mainHeader { display: none; }
    </style>
</head>
<body data-theme="dark">

    <div id="zoomModal" onclick="this.style.display='none'"><img id="zoomImg" style="max-width: 90%; border: 2px solid var(--gold);"></div>

    <!-- LOGIN -->
    <div id="vistaLogin" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="background: var(--bg-glass); padding: 40px; border-radius: 25px; border: 1px solid var(--gold); text-align: center; width: 90%; max-width: 400px;">
            <h2 style="color: var(--gold); margin-bottom: 25px;">ACCESO PRIVADO</h2>
            <input type="text" id="loginEmail" placeholder="Usuario">
            <input type="password" id="loginPass" placeholder="Contraseña" style="margin-top:15px;">
            <button class="btn-gold" style="width:100%; margin-top:25px;" onclick="login()">INGRESAR</button>
        </div>
    </div>

    <header id="mainHeader">
        <div onclick="irTableros()" style="cursor:pointer; font-weight:800; color: var(--gold);">PANEL DE CONTROL</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button onclick="toggleTheme()" style="background:none; border:1px solid var(--gold); color:var(--gold); border-radius:15px; padding:4px 10px; cursor:pointer;">🌓</button>
            <button onclick="logout()" style="color: #ff6b6b; background:none; border:none; cursor:pointer; font-weight:700;">Salir</button>
        </div>
    </header>

    <div class="container vistas" id="vistaNavegacion">
        <button id="btnVolverNav" class="btn-back" onclick="window.history.back()">← VOLVER</button>
        <div id="tituloVista" style="margin-bottom:20px;"></div>
        <div id="gridNav" class="grid-nav"></div>
        <button class="btn-gold" style="position:fixed; bottom:20px; right:20px; z-index:99;" onclick="abrirEditor()">+ Nuevo Registro</button>
    </div>

    <div class="container vistas" id="vistaCV">
        <button class="btn-back" onclick="window.history.back()">← VOLVER AL LISTADO</button>
        <div id="cvDetalle"></div>
    </div>

    <div class="container vistas" id="vistaEditor">
        <button class="btn-back" onclick="window.history.back()">← CANCELAR</button>
        <div style="background: var(--bg-glass); padding: 30px; border-radius: 25px; border: 1px solid var(--gold); max-width: 750px; margin: auto;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center;">
                <h2>Registro</h2>
                <div style="text-align: center;">
                    <img id="previsualizacion" src="" class="circulo-foto" onclick="zoomFoto(this.src)" style="display: none;">
                    <div id="circuloVacio" class="circulo-foto" onclick="document.getElementById('inFotoFile').click()"></div>
                    <button class="btn-gold" style="padding:5px 12px; font-size:0.7rem; margin-top:8px;" onclick="document.getElementById('inFotoFile').click()">Subir Foto</button>
                    <input type="file" id="inFotoFile" accept="image/*" style="display: none;" onchange="handleImage(this)">
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="inNom" placeholder="Nombre Completo" style="grid-column: span 2;">
                <select id="inCat"><option value="Iglesias">Iglesias</option><option value="Guardias">Guardias</option><option value="Madres">Madres</option></select>
                <input type="date" id="inFechaNac">
                <input type="text" id="inCiu" placeholder="Ciudad">
                <input type="text" id="inFilial" placeholder="Filial / Barrio">
                <input type="text" id="inDoc" placeholder="Cédula">
                <input type="text" id="inTel" placeholder="Teléfono">
                <select id="inRango" style="grid-column: span 2;"><option value="1ro">1ro</option><option value="2do">2do</option><option value="3ro">3ro</option><option value="4to">4to</option><option value="5to">5to</option></select>
                <textarea id="inHist" placeholder="Observaciones..." style="grid-column: span 2; height: 80px;"></textarea>
            </div>
            <button class="btn-gold" style="width: 100%; margin-top: 25px; padding: 18px;" onclick="guardar()">GUARDAR REGISTRO</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqRqarsT3kDLbb6id6N7p-zzC2BISWOWc",
            authDomain: "guardias-965a2.firebaseapp.com",
            projectId: "guardias-965a2",
            storageBucket: "guardias-965a2.firebasestorage.app",
            messagingSenderId: "1035525169686",
            appId: "1:1035525169686:web:043db97fdfc15524bf4b37"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let miembros = [], estadoNav = { tabla: null, ciudad: null, filial: null }, idEdit = null, base64Foto = "";

        // MANEJO DE BOTÓN ATRÁS DEL CELULAR
        window.onpopstate = function() {
            if (idEdit) { idEdit = null; renderizarActual(); }
            else if (estadoNav.filial) { estadoNav.filial = null; renderizarActual(); }
            else if (estadoNav.ciudad) { estadoNav.ciudad = null; renderizarActual(); }
            else if (estadoNav.tabla) { estadoNav.tabla = null; renderizarActual(); }
        };

        function pushState() { history.pushState({nav: true}, ""); }

        function login() {
            if (document.getElementById('loginEmail').value === "Guardias@admi" && document.getElementById('loginPass').value === "2398") {
                localStorage.setItem('session_admin', 'true');
                mostrarSistema();
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

        function mostrarSistema() {
            document.getElementById('vistaLogin').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            irTableros();
            db.collection("personal_guardia").onSnapshot(snap => {
                miembros = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderizarActual();
            });
        }

        function irTableros() { estadoNav = { tabla: null, ciudad: null, filial: null }; renderizarActual(); }

        function renderizarActual() {
            document.querySelectorAll('.vistas').forEach(v => v.style.display = 'none');
            document.getElementById('vistaNavegacion').style.display = 'block';
            document.getElementById('btnVolverNav').style.visibility = estadoNav.tabla ? 'visible' : 'hidden';
            
            const grid = document.getElementById('gridNav'); grid.innerHTML = "";

            if (!estadoNav.tabla) {
                document.getElementById('tituloVista').innerHTML = "<h2>Categorías</h2>";
                ["Iglesias", "Guardias", "Madres"].forEach(t => {
                    grid.innerHTML += `<div class="card-nav" onclick="estadoNav.tabla='${t}'; pushState(); renderizarActual()"><h3>${t}</h3></div>`;
                });
            } else if (!estadoNav.ciudad) {
                document.getElementById('tituloVista').innerHTML = `<h2>Ciudades</h2>`;
                const ciudades = [...new Set(miembros.filter(m => m.cat === estadoNav.tabla).map(m => m.ciudad))];
                ciudades.forEach(c => grid.innerHTML += `<div class="card-nav" onclick="estadoNav.ciudad='${c}'; pushState(); renderizarActual()"><h3>${c}</h3></div>`);
            } else if (!estadoNav.filial) {
                document.getElementById('tituloVista').innerHTML = `<h2>Filiales</h2>`;
                const filiales = [...new Set(miembros.filter(m => m.cat === estadoNav.tabla && m.ciudad === estadoNav.ciudad).map(m => m.filial))];
                filiales.forEach(f => grid.innerHTML += `<div class="card-nav" onclick="estadoNav.filial='${f}'; pushState(); renderizarActual()"><h3>${f}</h3></div>`);
            } else {
                document.getElementById('tituloVista').innerHTML = `<h2>${estadoNav.filial}</h2>`;
                miembros.filter(m => m.cat === estadoNav.tabla && m.ciudad === estadoNav.ciudad && m.filial === estadoNav.filial).forEach(m => {
                    grid.innerHTML += `<div class="card-nav" style="display:flex; align-items:center; gap:15px; text-align:left;" onclick="verCV('${m.id}')">
                        <img src="${m.foto || ''}" style="width:50px; height:50px; border-radius:50%; background:#000; object-fit:cover;">
                        <div><b>${m.nombre}</b><br><small>${m.rango}</small></div>
                    </div>`;
                });
            }
        }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            pushState();
            document.querySelectorAll('.vistas').forEach(v => v.style.display = 'none');
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvDetalle').innerHTML = `
                <div class="cv-card">
                    <div class="cv-header">
                        <div style="padding:20px; text-align:center;"><img src="${m.foto || ''}" class="cv-photo" onclick="zoomFoto(this.src)"></div>
                        <div style="padding:20px;">
                            <h1 style="color:var(--gold);">${m.nombre}</h1>
                            <button class="btn-gold" style="padding:5px 15px; margin-top:10px;" onclick="abrirEditor('${m.id}')">Editar</button>
                        </div>
                    </div>
                    <div class="cv-details">
                        <div class="cv-item"><div class="cv-label">Teléfono</div><div>${m.tel}</div></div>
                        <div class="cv-item"><div class="cv-label">Cargo</div><div>${m.rango}</div></div>
                        <div class="cv-item" style="grid-column: span 2;"><div class="cv-label">Ubicación</div><div>${m.ciudad} - ${m.filial}</div></div>
                    </div>
                </div>`;
        }

        function abrirEditor(id = null) {
            idEdit = id; pushState();
            document.querySelectorAll('.vistas').forEach(v => v.style.display = 'none');
            document.getElementById('vistaEditor').style.display = 'block';
            if(id) {
                const m = miembros.find(x => x.id === id);
                document.getElementById('inNom').value = m.nombre;
                document.getElementById('inCat').value = m.cat;
                document.getElementById('inCiu').value = m.ciudad;
                document.getElementById('inFilial').value = m.filial;
                document.getElementById('inFechaNac').value = m.fechaNac;
                document.getElementById('inDoc').value = m.doc;
                document.getElementById('inTel').value = m.tel;
                document.getElementById('inRango').value = m.rango;
                document.getElementById('inHist').value = m.hist;
                base64Foto = m.foto || "";
                document.getElementById('previsualizacion').src = base64Foto;
                document.getElementById('previsualizacion').style.display = base64Foto ? 'block' : 'none';
                document.getElementById('circuloVacio').style.display = base64Foto ? 'none' : 'block';
            } else {
                document.querySelectorAll('#vistaEditor input, #vistaEditor textarea').forEach(i => i.value = "");
                document.getElementById('previsualizacion').style.display = 'none';
                document.getElementById('circuloVacio').style.display = 'block';
                base64Foto = "";
            }
        }

        async function guardar() {
            const data = {
                nombre: document.getElementById('inNom').value,
                cat: document.getElementById('inCat').value,
                ciudad: document.getElementById('inCiu').value,
                filial: document.getElementById('inFilial').value,
                fechaNac: document.getElementById('inFechaNac').value,
                doc: document.getElementById('inDoc').value,
                tel: document.getElementById('inTel').value,
                rango: document.getElementById('inRango').value,
                hist: document.getElementById('inHist').value,
                foto: base64Foto
            };
            if(idEdit) await db.collection("personal_guardia").doc(idEdit).update(data);
            else await db.collection("personal_guardia").add(data);
            window.history.back();
        }

        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Foto = e.target.result;
                    document.getElementById('previsualizacion').src = base64Foto;
                    document.getElementById('previsualizacion').style.display = 'block';
                    document.getElementById('circuloVacio').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function zoomFoto(src) { if(src) { document.getElementById('zoomImg').src = src; document.getElementById('zoomModal').style.display = 'flex'; } }

        window.onload = () => { if(localStorage.getItem('session_admin')) mostrarSistema(); };
    </script>
</body>
</html>
