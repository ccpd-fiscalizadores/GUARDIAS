<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA ELITE - GUARDIAS</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#051F20">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020c0b;
            --bg-main: #051F20;         
            --glass: rgba(11, 43, 38, 0.7);
            --accent: #235E51;     
            --menta: #DAF1DE;      
            --gold: #C5A059;
            --texto: #f8fafc;
            --borde: rgba(218, 241, 222, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: radial-gradient(circle at top right, var(--accent), var(--bg-deep));
            color: var(--texto); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* LOGIN PROFESIONAL */
        #vistaLogin { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80') center/cover;
        }
        .login-card {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 50px 40px; border-radius: 30px; width: 90%; max-width: 420px;
            border: 1px solid var(--borde); text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* HEADER Y NAVEGACIÓN */
        header { 
            background: var(--glass); backdrop-filter: blur(10px); padding: 1.5rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 1000;
        }

        /* GRID Y TARJETAS LUXURY */
        .grid-main { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; padding: 30px; 
        }
        .card-folder { 
            background: var(--glass); padding: 30px; border-radius: 24px; 
            border: 1px solid var(--borde); position: relative; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-folder:hover { 
            transform: translateY(-10px); border-color: var(--gold);
            background: rgba(35, 94, 81, 0.4);
        }
        
        /* BOTONES */
        .btn-primary { 
            background: var(--gold); color: var(--bg-deep); border: none; 
            padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; 
            width: 100%; letter-spacing: 1px; text-transform: uppercase;
        }
        .btn-outline { 
            background: transparent; border: 1px solid var(--menta); color: var(--menta); 
            padding: 10px 22px; border-radius: 12px; cursor: pointer; font-size: 0.9rem;
        }

        /* INPUTS MODERNOS */
        input, select, textarea { 
            background: rgba(0,0,0,0.2); border: 1px solid var(--borde); color: white; 
            padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px;
            outline: none;
        }
        input:focus { border-color: var(--gold); }

        /* CV ESTILO PRESTIGIO */
        .cv-container { max-width: 900px; margin: 40px auto; background: var(--glass); border-radius: 35px; border: 1px solid var(--borde); overflow: hidden; }
        .cv-header { 
            background: linear-gradient(to bottom, var(--accent), transparent); 
            padding: 60px 20px; text-align: center; 
        }
        .cv-photo { 
            width: 180px; height: 180px; border-radius: 40px; 
            border: 3px solid var(--gold); object-fit: cover; transform: rotate(-3deg);
        }

        #mainHeader, #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
        .tag-rango { background: var(--gold); color: var(--bg-deep); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>

    <div id="vistaLogin">
        <div class="login-card">
            <div style="font-size: 0.7rem; color: var(--gold); letter-spacing: 4px; margin-bottom: 10px;">PREMIUM ACCESS</div>
            <h1 style="font-weight: 800; font-size: 2rem; margin-bottom: 30px; color: var(--menta);">ELITE SYSTEM</h1>
            <input type="text" id="loginEmail" placeholder="ID de Usuario">
            <input type="password" id="loginPass" placeholder="Código de Acceso">
            <button class="btn-primary" onclick="login()">Autenticar</button>
            <p id="errorMsg" style="color: #ff6b6b; margin-top: 15px; display: none;">Acceso denegado. Verifique sus credenciales.</p>
        </div>
    </div>

    <header id="mainHeader">
        <div onclick="location.reload()" style="cursor:pointer; font-weight:800; letter-spacing: 2px;">
            <span style="color: var(--gold);">ELITE</span> GUARDIAS
        </div>
        <button onclick="logout()" class="btn-outline" style="border-color: #ff6b6b; color: #ff6b6b;">CERRAR SESIÓN</button>
    </header>

    <div id="vistaDashboard">
        <div style="padding: 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <input type="text" id="busqueda" placeholder="Filtrar base de datos..." onkeyup="buscador()" style="max-width: 400px; margin: 0;">
            <button class="btn-primary" style="width:auto; padding: 15px 35px;" onclick="abrirEditor()">+ REGISTRAR NUEVO</button>
        </div>
        <div style="padding: 0 40px;">
            <button id="btnBack" class="btn-outline" onclick="volverAtras()" style="display:none; margin-bottom: 20px;">← REGRESAR</button>
            <h3 id="tituloTxt" style="font-weight: 200; color: var(--menta); font-size: 1.5rem;">Explorar Ciudades</h3>
        </div>
        <div id="gridMain" class="grid-main"></div>
    </div>

    <div id="vistaCV">
        <div style="padding: 20px 40px;"><button class="btn-outline" onclick="irDashboard()">← VOLVER AL PANEL</button></div>
        <div id="cvContent" class="cv-container"></div>
    </div>

    <div id="vistaEditor">
        <div style="max-width: 700px; margin: 40px auto; background: var(--glass); padding: 40px; border-radius: 30px; border: 1px solid var(--borde);">
            <h2 style="color: var(--gold); margin-bottom: 30px; font-weight: 800;">FICHA DE REGISTRO</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="inNom" placeholder="Nombre y Apellido" style="grid-column: span 2;">
                <input type="date" id="inFechaNac">
                <input type="text" id="inDoc" placeholder="Cédula de Identidad">
                <input type="text" id="inCong" placeholder="Congregación / Sede">
                <input type="text" id="inCiu" placeholder="Ciudad">
                <input type="text" id="inTel" placeholder="WhatsApp">
                <select id="inRango">
                    <option value="Guardia 1ro">Rango: Guardia 1ro</option>
                    <option value="Guardia 2do">Rango: Guardia 2do</option>
                    <option value="Guardia 3ro">Rango: Guardia 3ro</option>
                    <option value="Guardia 4to">Rango: Guardia 4to</option>
                </select>
                <input type="text" id="inFoto" placeholder="URL de Imagen de Perfil" style="grid-column: span 2;">
                <textarea id="inHist" placeholder="Historial profesional y observaciones..." style="grid-column: span 2; height: 120px;"></textarea>
            </div>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn-primary" onclick="guardar()">GUARDAR EN SISTEMA</button>
                <button class="btn-outline" onclick="irDashboard()" style="width: 100%;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqRqarsT3kDLbb6id6N7p-zzC2BISWOWc",
            authDomain: "guardias-965a2.firebaseapp.com",
            projectId: "guardias-965a2",
            storageBucket: "guardias-965a2.firebasestorage.app",
            messagingSenderId: "1035525169686",
            appId: "1:1035525169686:web:043db97fdfc15524bf4b37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let miembros = [];
        let idEdit = null;
        let nivel = "ciudades";

        function login() {
            const user = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            if (user === "Guardias@admi" && pass === "2398") {
                localStorage.setItem('session_elite_v1', 'active');
                mostrarSistema();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function logout() { localStorage.removeItem('session_elite_v1'); location.reload(); }
        function mostrarSistema() { 
            document.getElementById('vistaLogin').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            irDashboard(); 
        }

        function irDashboard() {
            document.getElementById('vistaDashboard').style.display = 'block';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'none';
            escucharBaseDeDatos();
        }

        function escucharBaseDeDatos() {
            db.collection("personal_guardia").onSnapshot(snap => {
                miembros = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                if(nivel === "ciudades") renderCiudades();
            });
        }

        function renderCiudades() {
            nivel = "ciudades";
            document.getElementById('btnBack').style.display = 'none';
            document.getElementById('tituloTxt').innerText = "Directorios por Ciudad";
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const cius = [...new Set(miembros.map(m => m.ciudad))];
            cius.forEach(c => {
                grid.innerHTML += `<div class="card-folder" onclick="verCongregaciones('${c}')">
                    <div style="font-size: 0.6rem; color: var(--gold); margin-bottom: 10px;">UBICACIÓN</div>
                    <h3 style="font-size: 1.4rem;">${c}</h3>
                </div>`;
            });
        }

        function verCongregaciones(c) {
            nivel = "congs";
            document.getElementById('btnBack').style.display = 'inline-block';
            document.getElementById('tituloTxt').innerText = `Sedes: ${c}`;
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const congs = [...new Set(miembros.filter(m => m.ciudad === c).map(m => m.cong))];
            congs.forEach(co => {
                grid.innerHTML += `<div class="card-folder" onclick="verMiembros('${co}')">
                    <div style="font-size: 0.6rem; color: var(--gold); margin-bottom: 10px;">CONGREGACIÓN</div>
                    <h3>${co}</h3>
                </div>`;
            });
        }

        function verMiembros(co) {
            nivel = "miembros";
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            miembros.filter(m => m.cong === co).forEach(m => {
                grid.innerHTML += `
                <div class="card-folder" onclick="verCV('${m.id}')" style="display: flex; align-items: center; gap: 20px; text-align: left;">
                    <img src="${m.foto || 'https://via.placeholder.com/80'}" style="width:60px; height:60px; border-radius:15px; object-fit:cover;">
                    <div>
                        <div class="tag-rango">${m.rango}</div>
                        <h4 style="margin-top:5px;">${m.nombre}</h4>
                    </div>
                </div>`;
            });
        }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            const edad = m.fechaNac ? (new Date().getFullYear() - new Date(m.fechaNac).getFullYear()) + " años" : "---";
            document.getElementById('cvContent').innerHTML = `
                <div class="cv-header">
                    <img src="${m.foto || 'https://via.placeholder.com/180'}" class="cv-photo">
                    <h2 style="margin-top:25px; font-size: 2rem;">${m.nombre}</h2>
                    <div style="color: var(--gold); font-weight: 800; letter-spacing: 2px;">${m.rango.toUpperCase()}</div>
                </div>
                <div style="padding:40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="info-group" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;">
                        <div style="font-size: 0.7rem; color: var(--gold);">CONGREGACIÓN</div>
                        <div style="font-size: 1.1rem; font-weight: 600;">${m.cong}</div>
                    </div>
                    <div class="info-group" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;">
                        <div style="font-size: 0.7rem; color: var(--gold);">CIUDAD</div>
                        <div style="font-size: 1.1rem; font-weight: 600;">${m.ciudad}</div>
                    </div>
                    <div class="info-group" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;">
                        <div style="font-size: 0.7rem; color: var(--gold);">DOCUMENTO</div>
                        <div style="font-size: 1.1rem; font-weight: 600;">${m.doc}</div>
                    </div>
                    <div class="info-group" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;">
                        <div style="font-size: 0.7rem; color: var(--gold);">WHATSAPP</div>
                        <div style="font-size: 1.1rem; font-weight: 600;">${m.tel}</div>
                    </div>
                    <div style="grid-column: span 2; background: rgba(0,0,0,0.2); padding: 25px; border-radius: 20px; border-left: 4px solid var(--gold);">
                        <div style="font-size: 0.7rem; color: var(--gold); margin-bottom: 10px;">OBSERVACIONES / HISTORIAL</div>
                        <p style="line-height: 1.6; opacity: 0.9;">${m.hist || 'Sin registros adicionales en la base de datos.'}</p>
                    </div>
                    <button class="btn-primary" onclick="abrirEditor('${m.id}')" style="grid-column: span 2; margin-top: 20px;">MODIFICAR EXPEDIENTE</button>
                </div>`;
        }

        function abrirEditor(id = null) {
            idEdit = id;
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';
            if(id) {
                const m = miembros.find(x => x.id === id);
                document.getElementById('inNom').value = m.nombre;
                document.getElementById('inFechaNac').value = m.fechaNac;
                document.getElementById('inCong').value = m.cong;
                document.getElementById('inCiu').value = m.ciudad;
                document.getElementById('inTel').value = m.tel;
                document.getElementById('inDoc').value = m.doc;
                document.getElementById('inRango').value = m.rango;
                document.getElementById('inHist').value = m.hist;
                document.getElementById('inFoto').value = m.foto || "";
            } else {
                document.querySelectorAll('#vistaEditor input, #vistaEditor textarea').forEach(i => i.value = "");
            }
        }

        async function guardar() {
            const data = {
                nombre: document.getElementById('inNom').value,
                fechaNac: document.getElementById('inFechaNac').value,
                cong: document.getElementById('inCong').value,
                ciudad: document.getElementById('inCiu').value,
                tel: document.getElementById('inTel').value,
                doc: document.getElementById('inDoc').value,
                rango: document.getElementById('inRango').value,
                hist: document.getElementById('inHist').value,
                foto: document.getElementById('inFoto').value
            };
            if(!data.nombre || !data.ciudad) return alert("Nombre y Ciudad son obligatorios.");
            if(idEdit) await db.collection("personal_guardia").doc(idEdit).update(data);
            else await db.collection("personal_guardia").add(data);
            irDashboard();
        }

        function volverAtras() { renderCiudades(); }
        function buscador() {
            const term = document.getElementById('busqueda').value.toLowerCase();
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            nivel = "busqueda";
            document.getElementById('btnBack').style.display = 'inline-block';
            miembros.filter(m => m.nombre.toLowerCase().includes(term) || m.cong.toLowerCase().includes(term)).forEach(m => {
                grid.innerHTML += `
                <div class="card-folder" onclick="verCV('${m.id}')" style="display: flex; align-items: center; gap: 20px; text-align: left;">
                    <img src="${m.foto || 'https://via.placeholder.com/80'}" style="width:60px; height:60px; border-radius:15px; object-fit:cover;">
                    <div><div class="tag-rango">${m.rango}</div><h4 style="margin-top:5px;">${m.nombre}</h4></div>
                </div>`;
            });
        }

        window.onload = () => { if(localStorage.getItem('session_elite_v1')) mostrarSistema(); };
    </script>
</body>
</html>
